version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: compliance_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: compliance_platform
    networks:
      - compliance_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: compliance_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      - mongo
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/compliance_platform
      APP_GROQ_API_KEY: ${GROQ_API_KEY}
      APP_JWT_SECRET: ${JWT_SECRET:-compliance_platform_jwt_secret_change_in_prod}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - compliance_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000/api
    container_name: compliance_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - compliance_network

volumes:
  mongo_data:

networks:
  compliance_network:
    driver: bridge
