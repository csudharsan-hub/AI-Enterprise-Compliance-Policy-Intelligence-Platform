# ── Server ──────────────────────────────────────────────────────
# Render sets PORT automatically; fallback to 5000 for local dev
server.port=${PORT:5000}
spring.application.name=compliance-platform

# ── MongoDB ──────────────────────────────────────────────────────
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/compliance_platform}
spring.data.mongodb.auto-index-creation=true

# ── JWT ──────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:compliance_platform_super_secret_jwt_key_2024_enterprise_grade_change_in_prod}
app.jwt.expiration=604800000

# ── Groq AI ──────────────────────────────────────────────────────
# Set GROQ_API_KEY as an environment variable on Render (never hardcode in production)
app.groq.api-key=${GROQ_API_KEY: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}
app.groq.base-url=https://api.groq.com/openai/v1
app.groq.model=llama-3.3-70b-versatile
app.groq.max-tokens=4096
app.groq.temperature=0.1

# ── File Upload ──────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
app.upload.dir=./uploads

# ── CORS ─────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Logging ──────────────────────────────────────────────────────
logging.level.com.compliance=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n

# ── WebClient ────────────────────────────────────────────────────
app.webclient.timeout=60

# ── Async ────────────────────────────────────────────────────────
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
