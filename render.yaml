services:
  - type: web
    name: compliance-platform-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_DATA_MONGODB_URI
        sync: false          # set manually in Render dashboard
      - key: APP_JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: APP_GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false          # set to your Vercel frontend URL after deploy
      - key: SERVER_PORT
        value: 5000
      - key: SPRING_PROFILES_ACTIVE
        value: production
