services:
  - type: web
    name: compliance-platform-backend
    runtime: java
    rootDir: backend
    buildCommand: chmod +x mvnw && ./mvnw clean install -DskipTests
    startCommand: java -jar target/platform-1.0.0.jar
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false          # set manually in Render dashboard — MongoDB Atlas URI
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard — Groq API key
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # set to your Vercel frontend URL after deploy
                             # e.g. http://localhost:3000,https://your-app.vercel.app
